# =============================================================================
# JOB SCANNER CONFIG
# =============================================================================
# Edit this file to change companies, roles, or filtering. No Python needed.
#
# FILTER LOGIC (this is what drives precision/recall):
#   A job title is KEPT if EITHER:
#     (a) it contains any term in `strong_include`  (fires on its own), OR
#     (b) it contains any term in `context_terms` AND any term in `role_words`
#         (e.g. "model" alone is junk, "model" + "engineer" is real)
#   ...UNLESS the title contains any term in `hard_exclude` (always dropped).
#
# This keeps recall high (catches MLE, Applied Scientist, MoTS, etc.) while
# stopping the obvious false positives (financial modeling, sales models).
# =============================================================================

strong_include:
  - "machine learning"
  - "ml engineer"
  - "mle"
  - "ai engineer"
  - "applied scientist"
  - "applied ai"
  - "research scientist"
  - "research engineer"
  - "deep learning"
  - "llm"
  - "nlp"
  - "computer vision"
  - "mlops"
  - "ml platform"
  - "ml infra"
  - "ml infrastructure"
  - "generative ai"
  - "genai"
  - "data scientist"
  - "member of technical staff"
  - "ml ops"
  - "ai/ml"
  # --- General SWE titles (WIDEST mode: catches SWE-titled ML work + all SWE) ---
  # To cut volume later, delete the lines below you don't want, or add terms
  # like "frontend"/"mobile"/"ios"/"android" to hard_exclude.
  - "software engineer"
  - "software developer"
  - "software development engineer"
  - "sde"
  - "backend engineer"
  - "back end engineer"
  - "back-end engineer"
  - "full stack engineer"
  - "full-stack engineer"
  - "fullstack engineer"
  - "platform engineer"
  - "infrastructure engineer"
  - "systems engineer"
  - "distributed systems"
  - "data engineer"
  - "devops engineer"
  - "site reliability"
  - "sre"
  - "cloud engineer"
  - "founding engineer"

context_terms:
  - "model"
  - "inference"
  - "evaluation"
  - "eval"
  - "ai"
  - "ml"
  - "agent"
  - "rag"
  - "fine-tuning"
  - "foundation model"

role_words:
  - "engineer"
  - "scientist"
  - "developer"
  - "architect"
  - "researcher"
  - "research"
  - "ml"
  - "ai"

hard_exclude:
  - "sales"
  - "account executive"
  - "recruiter"
  - "marketing"
  - "financial model"
  - "business development"
  - "customer success"
  - "solutions consultant"
  - "support engineer"
  - "intern"
  - "manager, "
  - "director"

location_keywords: []

