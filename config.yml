# =============================================================================
# JOB SCANNER CONFIG
# =============================================================================
# Edit this file to change companies, roles, or filtering. No Python needed.
#
# FILTER LOGIC (this is what drives precision/recall):
#   A job title is KEPT if EITHER:
#     (a) it contains any term in `strong_include`  (fires on its own), OR
#     (b) it contains any term in `context_terms` AND any term in `role_words`
#         (e.g. "model" alone is junk, "model" + "engineer" is real)
#   ...UNLESS the title contains any term in `hard_exclude` (always dropped).
# =============================================================================

